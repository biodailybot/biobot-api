<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BioBot – BioDailyy</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:      #ffffff;
  --off-white:  #f9f8f6;
  --surface:    #f4f3f0;
  --surface2:   #eceae5;
  --border:     #e2e0db;
  --border-mid: #d0ceca;
  --text:       #1a1a18;
  --text-sec:   #4a4a47;
  --text-muted: #7a7a76;
  --text-dim:   #b0afa9;
  --accent:     #1a6b52;
  --accent-lt:  #e8f3ef;
  --accent-mid: #2d8a6a;
  --accent-dim: #c4ddd6;
  --user-bg:    #f0ede7;
  --user-bdr:   #dbd8d0;
  --sw:         256px;
  --r:          10px;
  --body:       'Instrument Sans', -apple-system, sans-serif;
  --serif:      'Instrument Serif', Georgia, serif;
}
html, body { height: 100%; background: var(--white); color: var(--text); font-family: var(--body); font-size: 15px; line-height: 1.6; overflow: hidden; }
#root { display: flex; height: 100vh; width: 100%; overflow: hidden; }
#sb { width: var(--sw); background: var(--off-white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform .28s cubic-bezier(.4,0,.2,1); z-index: 10; }
#sbh { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.lm { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.lt { display: flex; flex-direction: column; line-height: 1; }
.ln { font-family: var(--serif); font-size: 17px; color: var(--text); letter-spacing: -.2px; }
.lb { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
#ncb { width: 100%; padding: 8px 12px; background: var(--white); border: 1px solid var(--border-mid); border-radius: 8px; color: var(--text-sec); font-family: var(--body); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all .15s; }
#ncb:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
#cl { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.csl { font-size: 10px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--text-dim); padding: 8px 8px 4px; }
.ci { padding: 8px 10px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 6px; transition: background .1s; }
.ci:hover { background: var(--surface); }
.ci.active { background: var(--accent-lt); }
.ct { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.ci.active .ct { color: var(--accent); font-weight: 500; }
.cd { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 2px; border-radius: 4px; opacity: 0; transition: opacity .12s, color .12s; }
.ci:hover .cd { opacity: 1; }
.cd:hover { color: #b91c1c; }
#sbf { padding: 12px 14px; border-top: 1px solid var(--border); }
.sh { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--white); }
#hdr { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#mmb { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; }
.hl { display: flex; align-items: center; gap: 10px; flex: 1; }
.hi { display: flex; align-items: center; gap: 7px; }
.sd { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pd 2.5s ease-in-out infinite; }
@keyframes pd { 0%,100%{opacity:1}50%{opacity:.4} }
.ht { font-family: var(--serif); font-size: 17px; color: var(--text); letter-spacing: -.2px; }
.htag { font-size: 11px; font-weight: 500; color: var(--accent); background: var(--accent-lt); border: 1px solid var(--accent-dim); padding: 2px 8px; border-radius: 99px; }
#mc { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#mi { max-width: 720px; margin: 0 auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 2px; }
#ws { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 65vh; text-align: center; padding: 40px 24px 24px; animation: fu .45s ease; }
@keyframes fu { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.wi { width: 52px; height: 52px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.wt { font-family: var(--serif); font-size: 28px; color: var(--text); margin-bottom: 10px; letter-spacing: -.4px; line-height: 1.2; max-width: 400px; }
.ws { font-size: 15px; color: var(--text-muted); max-width: 380px; line-height: 1.65; margin-bottom: 32px; }
.sg { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; max-width: 520px; width: 100%; }
.sc { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 15px; cursor: pointer; text-align: left; transition: all .14s; font-family: var(--body); }
.sc:hover { border-color: var(--accent-dim); background: var(--accent-lt); transform: translateY(-1px); }
.sl { display: block; font-size: 10px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.stxt { display: block; font-size: 13px; color: var(--text-sec); line-height: 1.4; }
.mr { display: flex; gap: 11px; animation: mi2 .18s ease; padding: 5px 0; }
@keyframes mi2 { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.mr.user { flex-direction: row-reverse; }
.av { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.av.bot { background: var(--accent); }
.av.user { background: var(--surface2); border: 1px solid var(--border-mid); color: var(--text-muted); font-size: 10px; font-weight: 600; }
.mb { max-width: 76%; padding: 11px 15px; border-radius: 12px; font-size: 14.5px; line-height: 1.68; }
.mr.bot .mb { background: var(--off-white); border: 1px solid var(--border); border-top-left-radius: 3px; color: var(--text); }
.mr.user .mb { background: var(--user-bg); border: 1px solid var(--user-bdr); border-top-right-radius: 3px; color: var(--text); }
.mb p { margin-bottom: 9px; } .mb p:last-child { margin-bottom: 0; }
.mb strong { color: var(--accent); font-weight: 600; }
.mb em { color: var(--text-sec); }
.mb h1,.mb h2,.mb h3 { font-family: var(--serif); color: var(--text); margin: 14px 0 5px; }
.mb ul,.mb ol { padding-left: 18px; margin-bottom: 9px; }
.mb li { margin-bottom: 3px; }
.mb code { background: var(--surface2); border: 1px solid var(--border-mid); border-radius: 4px; padding: 1px 6px; font-size: 13px; font-family: 'Courier New', monospace; color: var(--accent); }
.mb pre { background: var(--surface2); border: 1px solid var(--border-mid); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 10px 0; }
.mb pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 13px; }
.mb blockquote { border-left: 2px solid var(--accent-dim); padding-left: 12px; margin: 10px 0; color: var(--text-muted); font-style: italic; }
.mb a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.sc-cur::after { content: '▋'; color: var(--accent); animation: bl .65s step-end infinite; margin-left: 1px; font-size: 13px; }
@keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }
#ti { display: none; padding: 5px 0; animation: mi2 .18s ease; }
.tw { display: flex; gap: 11px; align-items: flex-start; }
.td { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: var(--off-white); border: 1px solid var(--border); border-radius: 12px; border-top-left-radius: 3px; }
.tdot { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: tb 1.1s ease-in-out infinite; }
.tdot:nth-child(1){animation-delay:0s}.tdot:nth-child(2){animation-delay:.13s}.tdot:nth-child(3){animation-delay:.26s}
@keyframes tb { 0%,60%,100%{transform:translateY(0);background:var(--text-dim)}30%{transform:translateY(-5px);background:var(--accent)} }
#ia { padding: 14px 24px 18px; border-top: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
#iw { max-width: 720px; margin: 0 auto; background: var(--off-white); border: 1px solid var(--border-mid); border-radius: 12px; display: flex; align-items: flex-end; gap: 8px; padding: 9px 10px; transition: border-color .15s, box-shadow .15s; }
#iw:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,107,82,.08); background: var(--white); }
#inp { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--body); font-size: 14.5px; line-height: 1.5; resize: none; min-height: 24px; max-height: 160px; overflow-y: auto; scrollbar-width: thin; padding: 2px 0; }
#inp::placeholder { color: var(--text-dim); }
#sb2 { width: 32px; height: 32px; background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .14s; }
#sb2:hover:not(:disabled) { background: var(--accent-mid); transform: scale(1.05); }
#sb2:disabled { background: var(--border-mid); cursor: not-allowed; transform: none; }
.ih { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 8px; }
#ov { display: none; position: fixed; inset: 0; background: rgba(26,26,24,.4); z-index: 9; backdrop-filter: blur(2px); }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
@media (max-width: 660px) {
  #sb { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
  #sb.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.12); }
  #ov.open { display: block; }
  #mmb { display: flex; }
  .sg { grid-template-columns: 1fr; }
  .mb { max-width: 88%; }
  #ia { padding: 10px 14px 14px; }
}
</style>
</head>
